name: Build Synology Braswell Bluetooth Drivers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev bc flex bison \
            libelf-dev xz-utils gcc-9 g++-9
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90

      - name: Download Synology Braswell kernel source
        run: |
          wget -q "https://global.synologydownload.com/download/ToolChain/Synology%20NAS%20GPL%20Source/7.2-64570/braswell/linux-3.10.x.txz" -O linux-3.10.x.txz
          tar xf linux-3.10.x.txz

      - name: Prepare kernel
        run: |
          cd linux-3.10.x
          cp synoconfigs/braswell .config
          make ARCH=x86_64 CC=gcc-9 oldconfig < /dev/null
          make ARCH=x86_64 CC=gcc-9 prepare
          make ARCH=x86_64 CC=gcc-9 scripts

      - name: Generate Module.symvers via USB serial build
        run: |
          cd linux-3.10.x
          make ARCH=x86_64 CC=gcc-9 M=drivers/usb/serial modules
          ls -la Module.symvers

      - name: Enable Bluetooth in config
        run: |
          cd linux-3.10.x
          echo "CONFIG_BT=m" >> .config
          echo "CONFIG_BT_HCIBTUSB=m" >> .config
          echo "CONFIG_BT_RFCOMM=m" >> .config
          echo "CONFIG_BT_HIDP=m" >> .config
          make ARCH=x86_64 CC=gcc-9 oldconfig < /dev/null

      - name: Build Bluetooth modules
        run: |
          cd linux-3.10.x
          make ARCH=x86_64 CC=gcc-9 M=net/bluetooth modules
          make ARCH=x86_64 CC=gcc-9 M=drivers/bluetooth modules

      - name: Collect modules
        run: |
          mkdir -p output
          find linux-3.10.x/net/bluetooth -name "*.ko" -exec cp {} output/ \;
          find linux-3.10.x/drivers/bluetooth -name "*.ko" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: braswell-bluetooth-drivers
          path: output/*.ko
