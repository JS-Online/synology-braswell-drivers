name: Build Synology Braswell Bluetooth Drivers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev bc flex bison \
            libelf-dev xz-utils gcc-9 g++-9
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90

      - name: Download Synology Braswell kernel source
        run: |
          wget -q "https://global.synologydownload.com/download/ToolChain/Synology%20NAS%20GPL%20Source/7.2-64570/braswell/linux-3.10.x.txz" -O linux-3.10.x.txz
          tar xf linux-3.10.x.txz

      - name: Prepare kernel
        run: |
          cd linux-3.10.x
          cp synoconfigs/braswell .config
          make ARCH=x86_64 CC=gcc-9 oldconfig < /dev/null
          make ARCH=x86_64 CC=gcc-9 prepare
          make ARCH=x86_64 CC=gcc-9 scripts

      - name: Check Bluetooth config
        run: |
          echo "=== Bluetooth Kernel Config ==="
          grep -E "CONFIG_BT|CONFIG_RFKILL" linux-3.10.x/.config || echo "Nichts gefunden"

      - name: Enable Bluetooth in config
        run: |
          cd linux-3.10.x
          # Bluetooth als Modul aktivieren
          sed -i 's/# CONFIG_BT is not set/CONFIG_BT=m/' .config
          sed -i 's/# CONFIG_BT_HCIBTUSB is not set/CONFIG_BT_HCIBTUSB=m/' .config
          echo "CONFIG_BT=m" >> .config
          echo "CONFIG_BT_HCIBTUSB=m" >> .config
          echo "CONFIG_BT_RFCOMM=m" >> .config
          echo "CONFIG_BT_HIDP=m" >> .config
          make ARCH=x86_64 CC=gcc-9 oldconfig < /dev/null

      - name: Build Bluetooth modules
        run: |
          cd linux-3.10.x
          make ARCH=x86_64 CC=gcc-9 M=net/bluetooth modules 2>&1 || true
          make ARCH=x86_64 CC=gcc-9 M=drivers/bluetooth modules 2>&1 || true

      - name: Debug - find all ko files
        run: |
          echo "=== Alle .ko Dateien ==="
          find linux-3.10.x -name "*.ko" 2>/dev/null
          echo "=== net/bluetooth Inhalt ==="
          ls -la linux-3.10.x/net/bluetooth/
          echo "=== drivers/bluetooth Inhalt ==="
          ls -la linux-3.10.x/drivers/bluetooth/

      - name: Collect modules
        run: |
          mkdir -p output
          find linux-3.10.x -name "bluetooth.ko" -exec cp {} output/ \;
          find linux-3.10.x -name "btusb.ko" -exec cp {} output/ \;
          find linux-3.10.x -name "rfcomm.ko" -exec cp {} output/ \;
          ls -la output/ || echo "output ist leer"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: braswell-bluetooth-drivers
          path: output/*.ko
          if-no-files-found: warn
