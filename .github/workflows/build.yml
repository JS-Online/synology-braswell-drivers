name: Build Synology Braswell DSM 7 Drivers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev bc flex bison libelf-dev xz-utils

      - name: Download Synology Braswell kernel source
        run: |
          wget -q "https://global.synologydownload.com/download/ToolChain/Synology%20NAS%20GPL%20Source/7.2-64570/braswell/linux-3.10.x.txz" -O linux-3.10.x.txz
          tar xf linux-3.10.x.txz

      - name: Build USB serial modules
        run: |
          cd linux-3.10.x
          cp synoconfigs/braswell .config
          make ARCH=x86_64 oldconfig < /dev/null
          make ARCH=x86_64 prepare
          make ARCH=x86_64 scripts
          make ARCH=x86_64 M=drivers/usb/serial modules

      - name: Collect modules
        run: |
          mkdir -p output
          find linux-3.10.x/drivers/usb/serial -name "*.ko" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: braswell-dsm7-drivers
          path: output/*.ko
